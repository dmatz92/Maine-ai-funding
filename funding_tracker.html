<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funding Opportunity Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;
  --paper:#f5f3ee;--paper2:#eceae3;--paper3:#e2e0d8;
  --accent:#2d5a3d;--accent2:#4a8c62;--accent-bg:#eef4f0;
  --warn:#b85c00;--warn-bg:#fdf3e8;
  --blue:#1a3a6b;--blue-bg:#e8eef8;
  --purple:#4a2d6b;--purple-bg:#f0ebf8;
  --radius:3px;--radius-lg:6px;
  --mono:'DM Mono',monospace;--serif:'Lora',serif;--sans:'DM Sans',sans-serif;
}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;min-height:100vh}

.hdr{border-bottom:2px solid var(--ink);padding:20px 24px 16px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--paper)}
.hdr-title{font-family:var(--serif);font-size:24px;font-weight:600;letter-spacing:-0.3px;color:var(--ink)}
.hdr-sub{font-size:12px;color:var(--ink3);margin-top:2px;font-family:var(--sans)}
.hdr-meta{font-family:var(--mono);font-size:11px;color:var(--ink3);display:flex;gap:20px;align-items:center}
.hdr-stat{display:flex;flex-direction:column;align-items:flex-end}
.hdr-stat span:first-child{font-size:18px;font-weight:500;color:var(--ink)}
.hdr-stat span:last-child{font-size:10px;color:var(--ink3)}

.toolbar{padding:12px 24px;border-bottom:1px solid var(--paper3);display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--paper);position:sticky;top:0;z-index:10;box-shadow:0 1px 0 var(--paper3)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{width:100%;border:1px solid var(--paper3);background:var(--paper2);border-radius:var(--radius);padding:7px 10px 7px 32px;font-family:var(--sans);font-size:13px;color:var(--ink);outline:none}
.search-wrap input:focus{border-color:var(--ink3)}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink3)}
.view-toggle{display:flex;border:1px solid var(--paper3);border-radius:var(--radius);overflow:hidden}
.view-btn{padding:6px 11px;background:var(--paper2);border:none;cursor:pointer;color:var(--ink3);display:flex;align-items:center;transition:all .15s}
.view-btn.active{background:var(--ink);color:var(--paper)}
.view-btn:first-child{border-right:1px solid var(--paper3)}

.filters{padding:10px 24px;border-bottom:1px solid var(--paper3);display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--paper2)}
.filter-label{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-right:2px;white-space:nowrap}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--paper3);background:var(--paper);font-size:12px;cursor:pointer;color:var(--ink2);transition:all .15s;white-space:nowrap;font-family:var(--sans)}
.chip:hover{border-color:var(--ink3)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip.elig-on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.status-open{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.chip.status-monitor{background:#7a5c00;color:#fff;border-color:#7a5c00}
.chip.status-closed{background:#5a5a54;color:#fff;border-color:#5a5a54}
.chip.status-radar{background:#4a2d6b;color:#fff;border-color:#4a2d6b}
.sep{width:1px;height:20px;background:var(--paper3);margin:0 4px;flex-shrink:0}

.content{padding:20px 24px;min-height:400px}
.results-bar{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.clear-btn{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;font-family:var(--mono);background:none;border:none}

/* STATUS PILL */
.status-pill{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500}
.sp-open{background:var(--blue-bg);color:var(--blue);border:1px solid #c0cfe8}
.sp-monitor{background:#faeeda;color:#7a5c00;border:1px solid #e8c878}
.sp-closed{background:var(--paper2);color:var(--ink3);border:1px solid var(--paper3)}

/* ELIG PILL */
.elig-pill{display:inline-block;font-family:var(--mono);font-size:9px;padding:2px 8px;border-radius:20px;white-space:nowrap}
.ep-lead{background:var(--accent-bg);color:var(--accent);border:1px solid #b0d4bc}
.ep-partner{background:var(--blue-bg);color:var(--blue);border:1px solid #c0cfe8}
.ep-tbd{background:var(--warn-bg);color:var(--warn);border:1px solid #f0c080}

/* CARD GRID */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:#fff;border:1px solid var(--paper3);border-radius:var(--radius-lg);padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s}
.card:hover{border-color:var(--ink3)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.org-name{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3)}
.type-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.badge-fed{background:var(--blue-bg);color:var(--blue);border:1px solid #c0cfe8}
.badge-phil{background:var(--purple-bg);color:var(--purple);border:1px solid #d4c8ec}
.card-title{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ink);line-height:1.35}
.card-desc{font-size:12px;color:var(--ink2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--paper2);color:var(--ink3);border:1px solid var(--paper3)}
.card-footer{border-top:1px solid var(--paper2);padding-top:8px;display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:auto}
.funding-amt{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink)}
.award-detail{font-size:10px;color:var(--ink3);font-family:var(--mono);margin-top:2px}
.card-pills{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.card-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px}
.card-link{font-family:var(--mono);font-size:10px;color:var(--accent2);text-decoration:none}
.card-link:hover{text-decoration:underline}
.card-note{font-size:11px;color:var(--ink3);font-style:italic;line-height:1.4;border-top:1px solid var(--paper2);padding-top:7px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:2px solid var(--ink)}
th{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);padding:8px 10px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--ink)}
th .sort-ind{margin-left:3px;opacity:.4}
th.sorted .sort-ind{opacity:1}
tbody tr{border-bottom:1px solid var(--paper2);transition:background .1s}
tbody tr:hover{background:var(--paper2)}
td{padding:9px 10px;vertical-align:middle}
td.org{font-family:var(--mono);font-size:10px;color:var(--ink3);white-space:nowrap}
td.opp{font-family:var(--serif);font-size:13px;font-weight:600;max-width:200px}
td.amt{font-family:var(--mono);font-size:12px;white-space:nowrap}
td.tags-cell{max-width:200px}
.tbl-tags{display:flex;flex-wrap:wrap;gap:3px}
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-family:var(--mono);font-size:13px}

/* SECTION HEADERS */
.section-header{display:flex;align-items:center;gap:10px;padding:16px 0 10px;border-bottom:2px solid var(--ink);margin-bottom:4px}
.tbl-section-header{display:flex;align-items:center;gap:10px;padding:16px 0 10px;border-bottom:2px solid var(--ink);margin-bottom:0}
.section-icon{font-size:14px;color:var(--ink2)}
.section-label{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink)}
.section-count{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-left:auto}
.section-divider{height:32px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">Funding Opportunity Tracker</div>
    <div class="hdr-sub">AI &amp; Economic Opportunity — Maine Office of the Future of Industry</div>
  </div>
  <div class="hdr-meta" id="hdr-stats"></div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search opportunities...">
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-cards" onclick="setView('cards')" title="Card view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    </button>
    <button class="view-btn" id="btn-table" onclick="setView('table')" title="Table view">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="content">
  <div class="results-bar">
    <span id="results-count"></span>
    <button class="clear-btn" id="clear-btn" onclick="clearFilters()" style="display:none">Clear all filters</button>
  </div>
  <div id="cards-view" class="card-grid"></div>
  <div id="table-view" class="tbl-wrap" style="display:none"></div>
</div>

    nofoUrl:'',
    govtElig:'As lead', total:0, award:'Technical assistance only (no grants)',

let currentView = 'cards';
let sortCol = null, sortDir = 1;
let filters = {search:'', topics:[], elig:'all', status:'all'};

function fmtMoney(n){
  if(!n) return '—';
  if(n>=1e9) return '$'+(n/1e9).toFixed(1)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(0)+'M';
  return '$'+n.toLocaleString();
}

function fmtDate(d){
  if(!d) return '—';
  return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
}

function statusPill(s){
  if(s==='Open now') return `<span class="status-pill sp-open">Open now</span>`;
  if(s==='Closed - pending award announcements') return `<span class="status-pill sp-closed">Closed — pending awards</span>`;
  if(s==='On radar') return `<span class="status-pill" style="background:var(--purple-bg);color:var(--purple);border:1px solid #d4c8ec">On radar</span>`;
  return `<span class="status-pill sp-monitor">Monitoring</span>`;
}

function eligPill(e){
  if(e==='As lead') return `<span class="elig-pill ep-lead">Lead applicant</span>`;
  if(e==='As partner') return `<span class="elig-pill ep-partner">As partner</span>`;
  return `<span class="elig-pill ep-tbd">Eligibility TBD</span>`;
}

function topicLabel(key){ return TOPICS[TOPIC_KEYS.indexOf(key)]||key; }

function getFiltered(){
  let data = [...raw];
  const s = filters.search.toLowerCase();
  if(s) data = data.filter(d=>d.org.toLowerCase().includes(s)||d.opp.toLowerCase().includes(s)||d.desc.toLowerCase().includes(s)||d.note.toLowerCase().includes(s));
  if(filters.topics.length) data = data.filter(d=>filters.topics.every(t=>d.topics.includes(t)));
  if(filters.elig!=='all') data = data.filter(d=>d.govtElig===filters.elig);
  if(filters.status!=='all') data = data.filter(d=>d.status===filters.status);
  if(sortCol){
    data.sort((a,b)=>{
      let av=a[sortCol],bv=b[sortCol];
      if(sortCol==='total'){av=av||0;bv=bv||0;}
      if(sortCol==='close'){av=av||'9999';bv=bv||'9999';}
      if(av<bv) return -sortDir; if(av>bv) return sortDir; return 0;
    });
  }
  return data;
}

function renderFilters(){
  const el = document.getElementById('filters');
  const topicChips = TOPIC_KEYS.map((k,i)=>`<button class="chip${filters.topics.includes(k)?' on':''}" onclick="toggleTopic('${k}')">${TOPICS[i]}</button>`).join('');

  const eligChips = ELIG_OPTS.map(({val,label})=>{
    const active = filters.elig===val;
    const cls = active ? (val==='all' ? ' on' : ' elig-on') : '';
    return `<button class="chip${cls}" onclick="setElig('${val}')">${label}</button>`;
  }).join('');

  const statusChips = STATUS_OPTS.map(({val,label})=>{
    const active = filters.status===val;
    let cls = '';
    if(active){
      if(val==='all') cls=' on';
      else if(val==='Open now') cls=' status-open';
      else if(val==='Monitoring for future rounds') cls=' status-monitor';
      else if(val==='Closed - pending award announcements') cls=' status-closed';
      else if(val==='On radar') cls=' status-radar';
    }
    return `<button class="chip${cls}" onclick="setStatus('${val}')">${label}</button>`;
  }).join('');

  el.innerHTML=`
    <span class="filter-label">Topics</span>${topicChips}
    <div class="sep"></div>
    <span class="filter-label">Govt Role</span>${eligChips}
    <div class="sep"></div>
    <span class="filter-label">Status</span>${statusChips}
  `;
}

function renderCard(d){
  const topicTags = d.topics.map(t=>`<span class="tag">${topicLabel(t)}</span>`).join('');
  return `<div class="card">
    <div class="card-top">
      <div class="org-name">${d.org}</div>
      <span class="type-badge ${d.type==='Federal'?'badge-fed':'badge-phil'}">${d.type}</span>
    </div>
    <div class="card-title">${d.opp}</div>
    <div class="card-desc">${d.desc}</div>
    <div class="card-tags">${topicTags}</div>
    <div class="card-footer">
      <div>
        <div class="funding-amt">${fmtMoney(d.total)}</div>
        ${d.award?`<div class="award-detail">${d.award}</div>`:''}
      </div>
      <div style="text-align:right">
        ${d.close?`<div style="font-family:var(--mono);font-size:10px;color:var(--ink3)">Close: ${fmtDate(d.close)}</div>`:''}
      </div>
    </div>
    <div class="card-pills">
      ${eligPill(d.govtElig)}
    </div>
    ${d.note?`<div class="card-note">${d.note}</div>`:''}
    <div class="card-bottom">
      <a href="${d.url}" target="_blank" class="card-link">View opportunity ↗</a>
      ${d.nofoUrl?`<a href="${d.nofoUrl}" target="_blank" class="card-link">NOFO ↗</a>`:''}
    </div>
  </div>`;
}

function renderCards(data){
  const el = document.getElementById('cards-view');
  if(!data.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">No opportunities match your filters.</div>`;return;}
  // When a single status is filtered, just show flat grid; otherwise show sections
  if(filters.status !== 'all'){
    el.innerHTML = data.map(renderCard).join('');
    return;
  }
  let html = '';
  SECTIONS.forEach(sec=>{
    const group = data.filter(d=>d.status===sec.key);
    if(!group.length) return;
    html += `<div class="section-header" style="grid-column:1/-1">
      <span class="section-icon">${sec.icon}</span>
      <span class="section-label">${sec.label}</span>
      <span class="section-count">${group.length}</span>
    </div>`;
    html += group.map(renderCard).join('');
    html += `<div class="section-divider" style="grid-column:1/-1"></div>`;
  });
  el.innerHTML = html;
}

function renderTable(data){
  const el = document.getElementById('table-view');
  if(!data.length){el.innerHTML=`<div class="empty">No opportunities match your filters.</div>`;return;}
  const cols = [
    {k:'org',label:'Org'},{k:'opp',label:'Opportunity'},{k:'total',label:'Funding'},
    {k:'award',label:'Award'},{k:'close',label:'Close Date'},
    {k:'govtElig',label:'Govt Role'},{k:'topics',label:'Topics'}
  ];
  const head = cols.map(c=>`<th onclick="doSort('${c.k}')" class="${sortCol===c.k?'sorted':''}">${c.label}<span class="sort-ind">${sortCol===c.k?(sortDir>0?'↑':'↓'):'↕'}</span></th>`).join('');

  function makeRows(group){
    return group.map(d=>{
      const tags = d.topics.map(t=>`<span class="tag">${topicLabel(t)}</span>`).join('');
      return `<tr>
        <td class="org">${d.org}</td>
        <td class="opp"><a href="${d.url}" target="_blank" style="color:var(--ink);text-decoration:none">${d.opp}</a></td>
        <td class="amt">${fmtMoney(d.total)}</td>
        <td>${d.award||'—'}</td>
        <td style="font-family:var(--mono);font-size:11px;white-space:nowrap">${fmtDate(d.close)}</td>
        <td>${eligPill(d.govtElig)}</td>
        <td class="tags-cell"><div class="tbl-tags">${tags}</div></td>
      </tr>`;
    }).join('');
  }

  if(filters.status !== 'all'){
    el.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${makeRows(data)}</tbody></table>`;
    return;
  }

  let html = '';
  SECTIONS.forEach(sec=>{
    const group = data.filter(d=>d.status===sec.key);
    if(!group.length) return;
    html += `<div class="tbl-section-header">
      <span class="section-icon">${sec.icon}</span>
      <span class="section-label">${sec.label}</span>
      <span class="section-count">${group.length}</span>
    </div>
    <table><thead><tr>${head}</tr></thead><tbody>${makeRows(group)}</tbody></table>
    <div style="height:24px"></div>`;
  });
  el.innerHTML = html;
}

function renderStats(){
  const data = getFiltered();
  const total = data.reduce((s,d)=>s+(d.total||0),0);
  const openCount = raw.filter(d=>d.status==='Open now').length;
  document.getElementById('hdr-stats').innerHTML=`
    <div class="hdr-stat"><span>${fmtMoney(total)}</span><span>filtered total</span></div>
    <div class="hdr-stat"><span>${data.length}/${raw.length}</span><span>opportunities</span></div>
    <div class="hdr-stat"><span>${openCount}</span><span>open now</span></div>
  `;
}

function render(){
  const data = getFiltered();
  renderStats();
  renderFilters();
  const hasFilters = filters.search||filters.topics.length||filters.elig!=='all'||filters.status!=='all';
  document.getElementById('clear-btn').style.display = hasFilters?'':'none';
  document.getElementById('results-count').textContent = `${data.length} opportunit${data.length===1?'y':'ies'}`;
  if(currentView==='cards') renderCards(data);
  else renderTable(data);
}

function setView(v){
  currentView=v;
  document.getElementById('cards-view').style.display=v==='cards'?'grid':'none';
  document.getElementById('table-view').style.display=v==='table'?'block':'none';
  document.getElementById('btn-cards').classList.toggle('active',v==='cards');
  document.getElementById('btn-table').classList.toggle('active',v==='table');
  render();
}

function toggleTopic(k){const i=filters.topics.indexOf(k);if(i>=0)filters.topics.splice(i,1);else filters.topics.push(k);render();}
function setElig(v){filters.elig=v;render();}
function setStatus(v){filters.status=v;render();}
function clearFilters(){filters={search:'',topics:[],elig:'all',status:'all'};document.getElementById('search').value='';render();}
function doSort(k){if(sortCol===k)sortDir*=-1;else{sortCol=k;sortDir=1;}render();}

document.getElementById('search').addEventListener('input',e=>{filters.search=e.target.value;render();});
render();
</script>
</body>
</html>
